name: Python PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main  # Changes to this target branch trigger the run

jobs:
  python-run:
    runs-on: windows-2025

    steps:
      # Step 1: Download your repo code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the runner
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Specify your preferred version
          cache: 'pip'          # Optional: Speeds up subsequent runs

      # Step 3: Install project dependencies (if any)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Execute your specific Python script or tests
      - name: Run Python Script
        run: python test.py
